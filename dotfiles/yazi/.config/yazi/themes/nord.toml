	{ mime = "application/{pdf,doc,rtf}", fg = "#88C0D0" },
	{ mime = "vfs/{absent,stale}", fg = "#4C566A" },
	{ url = "*", is = "orphan", bg = "#BF616A" },
	{ url = "*", is = "exec"  , fg = "#A3BE8C" },
	{ url = "*", is = "dummy", bg = "#BF616A" },
	{ url = "*/", is = "dummy", bg = "#BF616A" },
	{ url = "*/", fg = "#88C0D0" }
]

