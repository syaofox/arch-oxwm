# If the user's terminal is in dark mode, Yazi will load `theme-dark.toml` on startup; otherwise, `theme-light.toml`.
# You can override any parts of them that are not related to the dark/light mode in your own `theme.toml`.

# If you want to dynamically override their content based on dark/light mode, you can specify two different flavors
# for dark and light modes under `[flavor]`, and do so in those flavors instead.
"$schema" = "https://yazi-rs.github.io/schemas/theme.json"

# vim:fileencoding=utf-8:foldmethod=marker

# : Flavor {{{

[flavor]
dark  = ""
light = ""

# : }}}


# : App {{{

[app]
overall = { bg = "#F5F5F5", fg = "#162124" }

# : }}}


# : Manager {{{

[mgr]
cwd = { fg = "#1A8680" }

# Find
find_keyword  = { fg = "#D4AC0D", bold = true, italic = true, underline = true }
find_position = { fg = "#E91E63", bg = "reset", bold = true, italic = true }

# Symlink
symlink_target = { italic = true }

# Marker
marker_copied   = { fg = "#27AE60",  bg = "#27AE60" }
marker_cut      = { fg = "#C0392B",    bg = "#C0392B" }
marker_marked   = { fg = "#1A8680",   bg = "#1A8680" }
marker_selected = { fg = "#D4AC0D", bg = "#D4AC0D" }

# Count
count_copied   = { fg = "#162124", bg = "#27AE60" }
count_cut      = { fg = "#162124", bg = "#C0392B" }
count_selected = { fg = "#F5F5F5", bg = "#D4AC0D" }

# Border
border_symbol = "Ôöé"
border_style  = { fg = "#5D6D72" }

# Highlighting
syntect_theme = ""

# : }}}


# : Tabs {{{

[tabs]
active   = { bg = "#1A8680", bold = true }
inactive = { fg = "#1A8680", bg = "#5D6D72" }

# Separator
sep_inner = { open = "¯éÂ", close = "¯é┤" }
sep_outer = { open = "¯éÂ", close = "¯é┤" }

# : }}}


# : Mode {{{

[mode]
normal_main = { bg = "#27AE60", bold = true }
normal_alt  = { fg = "#27AE60", bg = "#5D6D72" }

# Select mode
select_main = { bg = "#C0392B", bold = true }
select_alt  = { fg = "#C0392B", bg = "#5D6D72" }

# Unset mode
unset_main = { bg = "#E91E63", bold = true }
unset_alt  = { fg = "#E91E63", bg = "#5D6D72" }

# : }}}


# : Indicator of hovered file {{{

[indicator]
parent  = { reversed = true }
current = { reversed = true }
preview = { underline = true }
padding = { open = "¯éÂ", close = "¯é┤" }

# : }}}


# : Status bar {{{

[status]
overall   = {}
sep_left  = { open = "¯éÂ", close = "¯é┤" }
sep_right = { open = "¯éÂ", close = "¯é┤" }

# Permissions
perm_sep   = { fg = "#5D6D72" }
perm_type  = { fg = "#27AE60" }
perm_read  = { fg = "#D4AC0D" }
perm_write = { fg = "#C0392B" }
perm_exec  = { fg = "#1A8680" }

# Progress
progress_label  = { bold = true }
progress_normal = { fg = "#27AE60", bg = "#5D6D72" }
progress_error  = { fg = "#D4AC0D", bg = "#C0392B" }

# : }}}


# : Which {{{

[which]
cols            = 3
mask            = { bg = "#F5F5F5" }
cand            = { fg = "#1A8680" }
rest            = { fg = "#5D6D72" }
desc            = { fg = "#E91E63" }
separator       = " ¯¬£ "
separator_style = { fg = "#5D6D72" }

# : }}}


# : Confirmation {{{

[confirm]
border     = { fg = "#1A8680" }
title      = { fg = "#1A8680" }
body       = {}
list       = {}
btn_yes    = { reversed = true }
btn_no     = {}
btn_labels = [ "  [Y]es  ", "  (N)o  " ]

# : }}}


# : Spotter {{{

[spot]
border = { fg = "#1A8680" }
title  = { fg = "#1A8680" }

# Table
tbl_col  = { fg = "#1A8680" }
tbl_cell = { fg = "#D4AC0D", reversed = true }

# : }}}


# : Notification {{{

[notify]
title_info  = { fg = "#27AE60" }
title_warn  = { fg = "#D4AC0D" }
title_error = { fg = "#C0392B" }

# Icons
icon_info  = "´üÜ"
icon_warn  = "´ü▒"
icon_error = "´üù"

# : }}}


# : Picker {{{

[pick]
border   = { fg = "#1A8680" }
active   = { fg = "#E91E63", bold = true }
inactive = {}

# : }}}


# : Input {{{

[input]
border   = { fg = "#1A8680" }
title    = {}
value    = {}
selected = { reversed = true }

# : }}}


# : Completion {{{

[cmp]
border   = { fg = "#1A8680" }
active   = { reversed = true }
inactive = {}

# Icons
icon_file    = "´àø"
icon_folder  = "´äò"
icon_command = "´Æë"

# : }}}


# : Task manager {{{

[tasks]
border  = { fg = "#1A8680" }
title   = {}
hovered = { fg = "#E91E63", bold = true }

# : }}}


# : Help menu {{{

[help]
on      = { fg = "#1A8680" }
run     = { fg = "#E91E63" }
desc    = {}
hovered = { reversed = true, bold = true }
footer  = { fg = "#F5F5F5", bg = "#162124" }

# : }}}


# : File-specific styles {{{

[filetype]
rules = [
	# Image
	{ mime = "image/*", fg = "#D4AC0D" },
	# Media
	{ mime = "{audio,video}/*", fg = "#E91E63" },
	# Archive
	{ mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#C0392B" },
	# Document
	{ mime = "application/{pdf,doc,rtf}", fg = "#1A8680" },
	# Virtual file system
	{ mime = "vfs/{absent,stale}", fg = "#5D6D72" },
	# Special file
	{ url = "*", is = "orphan", bg = "#C0392B" },
	{ url = "*", is = "exec"  , fg = "#27AE60" },
	# Dummy file
	{ url = "*", is = "dummy", bg = "#C0392B" },
	{ url = "*/", is = "dummy", bg = "#C0392B" },
	# Fallback
	{ url = "*/", fg = "#1A8680" }
]

# : }}}


